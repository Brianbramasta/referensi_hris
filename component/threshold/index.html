<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pengaturan Parameter Threshold Kategori</title>
    <!-- Menggunakan CDN Tailwind CSS versi 3 -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex flex-col">

    <header class="border-b border-[#EDECE9] bg-white sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <div class="w-8 h-8 rounded-lg bg-[#37352F] flex items-center justify-center text-white font-bold text-sm">
                    H
                </div>
                <div>
                    <span class="font-semibold tracking-tight block">HRIS Hub</span>
                    <span class="text-xs text-[#787774] -mt-1 block">Component Design System</span>
                </div>
            </div>
            <nav class="flex items-center space-x-6 text-sm font-medium text-[#787774]">
                <a href="#" class="text-[#37352F] hover:text-black transition">Overview</a>
                <a href="#" class="hover:text-black transition">Docs</a>
                <span class="h-4 w-px bg-[#EDECE9]"></span>
                <span class="text-xs bg-[#F1F1EF] text-[#37352F] px-2 py-1 rounded border border-[#EDECE9]">v1.0.0</span>
            </nav>
        </div>
    </header>

    <div class="flex-1 flex items-center justify-center p-4">
        <div class="bg-white p-6 rounded-2xl shadow-md w-full max-w-lg border border-gray-100">
        <h2 class="text-xl font-bold text-gray-900 mb-2">⚙️ Set Parameter Threshold</h2>
        <p class="text-sm text-gray-500 mb-6">Tentukan batas nilai minimum untuk setiap kategori evaluasi.</p>

        <!-- Bagian Form / Input Pengaturan -->
        <div class="space-y-4 mb-8">
            <!-- Batas Dipertimbangkan -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">
                    Batas Minimum <span class="text-yellow-600 font-semibold">"Dipertimbangkan"</span>
                </label>
                <input type="number" id="inputConsider" value="60" min="1" max="100"
                    class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 font-semibold">
                <p class="text-xs text-gray-400 mt-1">Nilai di bawah ini otomatis masuk "Tidak Direkomendasikan".</p>
            </div>

            <!-- Batas Disarankan -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">
                    Batas Minimum <span class="text-green-600 font-semibold">"Disarankan"</span>
                </label>
                <input type="number" id="inputRecommend" value="80" min="1" max="100"
                    class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 font-semibold">
                <p class="text-xs text-gray-400 mt-1">Nilai dari angka ini ke atas akan masuk kategori "Disarankan".</p>
            </div>
        </div>

        <hr class="border-gray-200 my-6">

        <!-- Bagian Simulasi / Pengetesan Real-time -->
        <h3 class="text-lg font-semibold text-gray-900 mb-3">🧪 Live Test / Simulasi</h3>
        <div class="bg-gray-50 p-4 rounded-xl border border-gray-200 space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-600 mb-1">Masukkan Nilai Seseorang (0 - 100):</label>
                <input type="number" id="testScore" value="75" min="0" max="100"
                    class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 font-semibold text-center text-lg">
            </div>

            <!-- Tempat Menampilkan Hasil Kategori -->
            <div class="text-center py-3 px-4 rounded-lg font-bold text-lg transition-all duration-300" id="resultBadge">
                -
            </div>
        </div>
    </div>

    <!-- Logic JavaScript Simpel -->
    <script>
        // Ambil elemen-elemen DOM yang dibutuhkan
        const inputConsider = document.getElementById('inputConsider');
        const inputRecommend = document.getElementById('inputRecommend');
        const testScore = document.getElementById('testScore');
        const resultBadge = document.getElementById('resultBadge');

        // Fungsi utama untuk mengecek kategori berdasarkan threshold saat ini
        function updateCategory() {
            // Ambil value terbaru berupa angka
            const limitConsider = parseFloat(inputConsider.value) || 0;
            const limitRecommend = parseFloat(inputRecommend.value) || 0;
            const score = parseFloat(testScore.value) || 0;

            // Validasi logika sederhana agar user tidak salah input (Batas Disarankan harus > Batas Dipertimbangkan)
            if (limitRecommend <= limitConsider) {
                resultBadge.className = "text-center py-3 px-4 rounded-lg font-bold text-sm bg-red-100 text-red-700";
                resultBadge.innerText = "⚠️ Error: Batas 'Disarankan' harus lebih besar dari 'Dipertimbangkan'!";
                return;
            }

            // Aturan penentuan kategori (Logika Threshold)
            if (score >= limitRecommend) {
                // Kategori: Disarankan
                resultBadge.className = "text-center py-3 px-4 rounded-lg font-bold text-lg bg-green-100 text-green-800 border border-green-200 shadow-sm";
                resultBadge.innerText = "🟢 DISARANKAN";
            } else if (score >= limitConsider) {
                // Kategori: Dipertimbangkan
                resultBadge.className = "text-center py-3 px-4 rounded-lg font-bold text-lg bg-yellow-100 text-yellow-800 border border-yellow-200 shadow-sm";
                resultBadge.innerText = "🟡 DIPERTIMBANGKAN";
            } else {
                // Kategori: Tidak Direkomendasikan
                resultBadge.className = "text-center py-3 px-4 rounded-lg font-bold text-lg bg-red-100 text-red-800 border border-red-200 shadow-sm";
                resultBadge.innerText = "🔴 TIDAK DIREKOMENDASIKAN";
            }
        }

        // Jalankan fungsi setiap kali ada perubahan pada input parameter maupun input nilai test
        inputConsider.addEventListener('input', updateCategory);
        inputRecommend.addEventListener('input', updateCategory);
        testScore.addEventListener('input', updateCategory);

        // Jalankan sekali saat pertama kali halaman di-load agar status awal langsung muncul
        updateCategory();
    </script>

</body>
</html>
