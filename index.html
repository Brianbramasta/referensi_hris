    <!-- JavaScript Ringan -->
    <script>
        // Logika sederhana untuk menampilkan pesan log saat card di-klik (sebelum halaman tujuan dibuat)
        document.querySelectorAll('.group').forEach(card => {
            card.addEventListener('click', (e) => {
                const componentName = card.querySelector('h3').innerText;
                console.log(`Navigating to reference details for: ${componentName}`);
                alert(`Modul "${componentName}" sedang disiapkan sebagai referensi.`);
            });
        });

        // Menampilkan waktu dinamis di footer
        const dateTimeSpan = document.getElementById('current-date-time');
        if(dateTimeSpan) {
            const options = { year: 'numeric', month: 'long', day: 'numeric' };
            dateTimeSpan.textContent = `Last updated: ${new Date().toLocaleDateString('id-ID', options)}`;
        }
    </script>
